name: swarmclaw
metadata:
  template: swarmclaw-prod

services:
  swarmclaw:
    host: containerapp
    language: docker
    project: .
    docker:
      path: Dockerfile
      context: .
      remoteBuild: true

infra:
  provider: bicep
  path: infra
  module: main

hooks:
  postprovision:
    shell: pwsh
    run: ./infra/postprovision.ps1
    interactive: false
